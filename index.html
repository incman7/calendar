<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    My Calendar
  </div>
  <div class="header-actions">
    <button class="btn" id="todayBtn">Today</button>
    <button class="btn" id="prevBtn">&#8592;</button>
    <button class="btn" id="nextBtn">&#8594;</button>
    <button class="btn-primary btn" id="addEventBtn">+ New event</button>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="mini-cal">
      <div class="mini-cal-header">
        <span class="mini-cal-month" id="miniMonth"></span>
        <div>
          <button class="mini-nav" id="miniPrev">&#8249;</button>
          <button class="mini-nav" id="miniNext">&#8250;</button>
        </div>
      </div>
      <div class="mini-grid" id="miniGrid"></div>
    </div>

    <div>
      <div class="sidebar-section-label">Categories</div>
      <div class="category-list" id="categoryList"></div>
    </div>
  </aside>

  <div class="cal-main">
    <div class="cal-toolbar">
      <div class="cal-title" id="calTitle"></div>
      <div class="view-tabs">
        <button class="view-tab active" data-view="timeGridWeek">Week</button>
        <button class="view-tab" data-view="timeGridDay">Day</button>
        <button class="view-tab" data-view="dayGridMonth">Month</button>
      </div>
    </div>
    <div class="cal-wrapper">
      <div id="calendar"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New event</div>
      <button class="modal-close" id="modalClose">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-input" id="evTitle" placeholder="Event name" autocomplete="off">
      </div>
      <div class="form-group" style="display:flex;gap:10px;">
        <div style="flex:1;">
          <label class="form-label">Start</label>
          <input type="datetime-local" class="form-input" id="evStart">
        </div>
        <div style="flex:1;">
          <label class="form-label">End</label>
          <input type="datetime-local" class="form-input" id="evEnd">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note</label>
        <textarea class="form-input" id="evNote" rows="2" placeholder="Optional note..." style="resize:vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-picker-row" id="colorPicker"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteBtn" style="display:none;">Delete</button>
      <button class="btn" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save event</button>
    </div>
  </div>
</div>

<!-- Event popup -->
<div class="event-popup" id="eventPopup">
  <div class="popup-color-bar" id="popupBar"></div>
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-time" id="popupTime"></div>
  <div class="popup-note" id="popupNote" style="display:none;"></div>
  <div class="popup-actions">
    <button class="btn" id="popupEdit" style="flex:1;">Edit</button>
    <button class="btn btn-danger" id="popupDelete">Delete</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
